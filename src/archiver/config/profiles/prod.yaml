# Production profile — structured logs, conservative cadence. (DESIGN.md §11.4)
# DATABASE_URL / REDIS_URL / GOVINFO_API_KEY are supplied via environment/secrets,
# never committed here.
log_level: INFO
log_json: true
min_poll_interval_s: 60
max_poll_interval_s: 1800
rate_limit_rps: 0.5
respect_robots: true
